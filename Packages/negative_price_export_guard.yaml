# Home Assistant package: Ochrana exportu pri zapornych spotovych cenach
#
# Subor je urceny na vlozenie do adresara packages/ v Home Assistant.
# Slovenske nazvy entit su zobrazovane nazvy. default_entity_id drzi stabilne entity_id,
# aby sablony a automatizacie fungovali aj po premenovani nazvu v UI.
#
# Ocakavane entity z integracii:

# Integracia OKTE DAM:
# - sensor.okte_ceny_elektriny_prices               # OKTE ceny, musi mat atribut prices

# Integracia Solcast:
# - sensor.solcast_pv_forecast_predpoved_dnes       # Solcast predpoved dnes, musi mat atribut detailedForecast
# - sensor.solcast_pv_forecast_predpoved_zostavajuca_dnes # Solcast odhad zostavajucej produkcie dnes

# Integracia menica (napr. Solarman):
# - sensor.inverter_today_load_consumption          # dnesna spotreba domu v kWh, reset o polnoci
# - sensor.inverter_total_energy_export             # celkovy export do siete v kWh, stale rastuci counter
# - sensor.inverter_today_production                # dnesna PV vyroba v kWh
# - sensor.inverter_battery                         # SOC baterie v %
# - sensor.inverter_battery_capacity                # kapacita baterie v kWh, fallback je 20 kWh
# - sensor.inverter_pv_power                        # aktualny PV vykon vo W
# - sensor.inverter_load_power                      # aktualna spotreba domu vo W
# - select.inverter_work_mode                       # rezim menica: Export First / Zero Export To CT
# - number.inverter_export_surplus_power            # maximalny vykon exportu do siete vo W
# - number.solarny_menic_grid_max_export_power      # maximalny povovleny vykon exportu do siete povoleny menicom, pouzivany ako hard limit pre vypocet odporucaneho exportu

# Vlastne vytvorena entita cez UI - pomocnik:
# - input_number.cena_elektriny_nocny_tarif         # konzervativna hodnota energie v EUR/kWh pre vypocet strateneho potencialu, fallback je 0.052 EUR/kWh

input_datetime:
  export_optimizer_solar_window_start_recorded:
    name: Export Optimizér - čas záznamu rannej spotreby
    has_date: true
    has_time: true

input_number:
  export_optimizer_solar_window_start_load_kwh:
    name: Export Optimizér - ranná spotreba domu
    min: 0
    max: 100
    step: 0.01
    unit_of_measurement: kWh
    mode: box

  export_optimizer_min_reserve_soc:
    name: Export Optimizér - minimálna rezerva batérie
    min: 10
    max: 90
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 40

  export_optimizer_consumption_margin_kwh:
    name: Export Optimizér - rezerva odhadu spotreby
    min: 0
    max: 10
    step: 0.5
    unit_of_measurement: kWh
    mode: slider
    initial: 2

  export_optimizer_export_surplus_threshold_kwh:
    name: Export Optimizér - minimalny ocakavany prebytok
    min: 0
    max: 10
    step: 0.25
    unit_of_measurement: kWh
    mode: slider
    initial: 1

  export_optimizer_price_floor:
    name: Export Optimizér - minimalna spotova cena pre export
    min: -50
    max: 50
    step: 0.1
    unit_of_measurement: EUR/MWh
    mode: box
    initial: 0

  export_optimizer_min_export_power_w:
    name: Export Optimizér - minimalny riadeny vykon exportu
    min: 0
    max: 5000
    step: 100
    unit_of_measurement: W
    mode: slider
    initial: 500

  export_optimizer_max_export_power_w:
    name: Export Optimizér - maximalny riadeny vykon exportu
    min: 100
    max: 10000
    step: 100
    unit_of_measurement: W
    mode: slider
    initial: 3000

  export_optimizer_typical_idle_power_w:
    name: Export Optimizér - typická minimálna spotreba domu vrátane meniča
    min: 0
    max: 3000
    step: 10
    unit_of_measurement: W
    mode: box

input_boolean:
  export_optimizer_export_guard_enabled:
    name: Export Optimizér - ochrana exportu zapnuta
    icon: mdi:shield-sun
    initial: true

  export_optimizer_export_guard_active:
    name: Export Optimizér - riadeny export aktivny
    icon: mdi:transmission-tower-export
    initial: false

  export_optimizer_allow_battery_early_export:
    name: Export Optimizér - povolit skory export z baterie
    icon: mdi:battery-arrow-down
    initial: true

template:
  - trigger:
      - platform: time
        at: "18:00:00"
    sensor:
      - name: Export Optimizér - priemer spotreby v solarnom okne 7d
        default_entity_id: sensor.export_optimizer_solar_window_load_7d_average
        unique_id: export_optimizer_solar_window_load_7d_average
        unit_of_measurement: kWh
        state: >
          {% set recorded = as_datetime(states('input_datetime.export_optimizer_solar_window_start_recorded')) %}
          {% set valid = recorded is not none and recorded.date() == now().date() %}
          {% set start = states('input_number.export_optimizer_solar_window_start_load_kwh') | float(0) %}
          {% set current = states('sensor.inverter_today_load_consumption') | float(0) %}
          {% set sample = ([current - start, 0] | max) | round(2) %}
          {% set old = this.attributes.get('past_consumption', []) if this is defined else [] %}
          {% if valid and sample > 0 %}
            {% set today = now().date() | string %}
            {% set filtered = old | rejectattr('date', 'eq', today) | list %}
            {% set samples = ([{'date': today, 'consumption': sample}] + filtered)[:7] %}
          {% else %}
            {% set samples = old %}
          {% endif %}
          {% set values = samples | map(attribute='consumption') | map('float') | list %}
          {{ ((values | sum) / (values | count)) | round(2) if values | count > 0 else 8 }}
        attributes:
          past_consumption: >
            {% set recorded = as_datetime(states('input_datetime.export_optimizer_solar_window_start_recorded')) %}
            {% set valid = recorded is not none and recorded.date() == now().date() %}
            {% set start = states('input_number.export_optimizer_solar_window_start_load_kwh') | float(0) %}
            {% set current = states('sensor.inverter_today_load_consumption') | float(0) %}
            {% set sample = ([current - start, 0] | max) | round(2) %}
            {% set old = this.attributes.get('past_consumption', []) if this is defined else [] %}

            {% if valid and sample > 0 %}
              {% set today = now().date() | string %}
              {% set filtered = old | rejectattr('date', 'eq', today) | list %}
              {{ ([{'date': today, 'consumption': sample}] + filtered)[:7] }}
            {% else %}
              {{ old }}
            {% endif %}

  - trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: sensor.okte_ceny_elektriny_prices
    sensor:
      - name: Export Optimizér OKTE spotova cena
        default_entity_id: sensor.export_optimizer_okte_spotova_cena
        unique_id: export_optimizer_okte_spot_price
        unit_of_measurement: EUR/MWh
        state: >
          {% set prices = state_attr('sensor.okte_ceny_elektriny_prices', 'prices') or [] %}
          {% set now_local = now() %}
          {% set ns = namespace(price=none) %}
          {% for p in prices %}
            {% set start_local = as_local(as_datetime(p.start)) %}
            {% if start_local <= now_local and now_local < start_local + timedelta(minutes=15) %}
              {% set ns.price = p.price | float %}
            {% endif %}
          {% endfor %}
          {{ ns.price if ns.price is not none else states('sensor.okte_ceny_elektriny_prices') | float(999) }}
        attributes:
          source: okte_prices_attribute

      - name: Cena výkupu elektriny
        # Cena výkupu je 0 keď je spotová cena záporná, inak je to konzervatívna hodnota založená na nočnom tarife
        # počas víkendu (teda s 12% zľavou), aby sme vedeli odhadnúť stratený potenciál pri záporných cenách.
        default_entity_id: sensor.cena_vykupu_elektriny
        unique_id: export_optimizer_solar_sell_price
        unit_of_measurement: EUR/kWh
        state: >
          {% if states('sensor.export_optimizer_okte_spotova_cena') | float(0) >= 0 %}
            {% set price = states('input_number.cena_elektriny_nocny_tarif') | float(0.052) * 0.88 %}
          {% else %}
            {% set price = 0 %}
          {% endif %}
          {{ price }}

  - trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: state
        entity_id:
          - sensor.inverter_today_production
          - sensor.inverter_today_load_consumption
          - sensor.solcast_pv_forecast_predpoved_dnes
          - sensor.solcast_pv_forecast_predpoved_zostavajuca_dnes
          - sensor.export_optimizer_okte_spotova_cena
          - input_boolean.export_optimizer_allow_battery_early_export
          - input_number.export_optimizer_price_floor
          - input_number.export_optimizer_min_export_power_w
          - input_number.export_optimizer_max_export_power_w
          - input_number.export_optimizer_consumption_margin_kwh
          - input_number.export_optimizer_export_surplus_threshold_kwh
          - input_number.export_optimizer_min_reserve_soc
    sensor:
      - name: Export Optimizér - spotreba v solarnom okne dnes
        default_entity_id: sensor.export_optimizer_solar_window_load_today
        unique_id: export_optimizer_solar_window_load_today
        unit_of_measurement: kWh
        state: >
          {% set recorded = as_datetime(states('input_datetime.export_optimizer_solar_window_start_recorded')) %}
          {% set valid = recorded is not none and recorded.date() == now().date() %}
          {% if now() < today_at('07:00') or not valid %}
            0
          {% else %}
            {% set start = states('input_number.export_optimizer_solar_window_start_load_kwh') | float(0) %}
            {% set current = states('sensor.inverter_today_load_consumption') | float(0) %}
            {{ [current - start, 0] | max | round(2) }}
          {% endif %}

      - name: Export Optimizér - odhad zostavajucej spotreby v solarnom okne
        default_entity_id: sensor.export_optimizer_remaining_solar_window_load_estimate
        unique_id: export_optimizer_remaining_solar_window_load_estimate
        unit_of_measurement: kWh
        state: >
          {% set avg = states('sensor.export_optimizer_solar_window_load_7d_average') | float(6) %}
          {% set margin = states('input_number.export_optimizer_consumption_margin_kwh') | float(2) %}
          {% set used = states('sensor.export_optimizer_solar_window_load_today') | float(0) %}
          {% if now() >= today_at('18:00') %}
            0
          {% else %}
            {% set end_time = today_at('18:00') | as_timestamp %}
            {% set current_time = now() | as_timestamp %}
            {% set hours_left = (end_time - current_time) / 3600 %}
            {% set hours_left = [hours_left, 0] | max %}
            {% set idle_power_w = states('input_number.export_optimizer_typical_idle_power_w') | float(0) %}
            {% set minimum_baseload_kwh = (idle_power_w * hours_left) / 1000 %}
            {{ [avg + margin - used, minimum_baseload_kwh] | max | round(2) }}
          {% endif %}

      - name: Export Optimizér - minuty zapornej ceny do 18:00
        default_entity_id: sensor.export_optimizer_negative_price_minutes_until_18
        unique_id: export_optimizer_negative_price_minutes_until_18
        unit_of_measurement: min
        state: >
          {% set prices = state_attr('sensor.okte_ceny_elektriny_prices','prices') or [] %}
          {% set now_ts = as_timestamp(now()) %}
          {% set horizon = as_timestamp(today_at('18:00')) %}
          {% set floor = states('input_number.export_optimizer_price_floor') | float(0) %}
          {% set ns = namespace(minutes=0) %}
          {% for p in prices %}
            {% set s = as_timestamp(as_datetime(p.start)) %}
            {% if s >= now_ts and s < horizon and (p.price | float(999)) < floor %}
              {% set ns.minutes = ns.minutes + 15 %}
            {% endif %}
          {% endfor %}
          {{ ns.minutes }}

      - name: Export Optimizér - cielove SOC baterie
        default_entity_id: sensor.export_optimizer_battery_target_soc
        unique_id: export_optimizer_battery_target_soc
        unit_of_measurement: "%"
        state: >
          {% set cap = states('sensor.inverter_battery_capacity') | float(20) %}
          {% set reserve = states('input_number.export_optimizer_min_reserve_soc') | float(40) %}
          {% set remaining_load = states('sensor.export_optimizer_remaining_solar_window_load_estimate') | float(0) %}
          {% set remaining_pv = states('sensor.solcast_pv_forecast_predpoved_zostavajuca_dnes') | float(0) %}
          {% set uncovered_load = [remaining_load - remaining_pv, 0] | max %}
          {{ [reserve + (uncovered_load / cap * 100), 95] | min | round(0) }}

      - name: Export Optimizér - ocakavany prebytok dnes
        default_entity_id: sensor.export_optimizer_expected_surplus_today
        unique_id: export_optimizer_expected_surplus_today
        unit_of_measurement: kWh
        state: >
          {% set cap = states('sensor.inverter_battery_capacity') | float(20) %}
          {% set soc = states('sensor.inverter_battery') | float(0) %}
          {% set reserve = states('input_number.export_optimizer_min_reserve_soc') | float(40) %}
          {% set battery_above_reserve = [((soc - reserve) / 100 * cap), 0] | max %}
          {% set remaining_bat_charging_cap = [((100 - soc) / 100 * cap), 0] | max %}
          {% set remaining_pv = states('sensor.solcast_pv_forecast_predpoved_zostavajuca_dnes') | float(0) %}
          {% set remaining_load = states('sensor.export_optimizer_remaining_solar_window_load_estimate') | float(0) %}
          {% set surplus = (remaining_pv - remaining_load - remaining_bat_charging_cap) | round(2) %}
          {{ [surplus, 0] | max }}

      - name: Export Optimizér - odporucany vykon exportu
        default_entity_id: sensor.export_optimizer_recommended_export_power
        unique_id: export_optimizer_recommended_export_power
        unit_of_measurement: W
        state: >
          {% set price = states('sensor.export_optimizer_okte_spotova_cena') | float(999) %}
          {% set floor = states('input_number.export_optimizer_price_floor') | float(0) %}
          {% if price < floor or now() < today_at('07:00') or now() >= today_at('18:00') %}
            0
          {% else %}
            {% set prices = state_attr('sensor.okte_ceny_elektriny_prices','prices') or [] %}
            {% set forecast = state_attr('sensor.solcast_pv_forecast_predpoved_dnes','detailedForecast') or [] %}
            {% set now_local = now() %}
            {% set window_end = today_at('18:00') %}
            {% set cap = states('sensor.inverter_battery_capacity') | float(20) %}
            {% set soc = states('sensor.inverter_battery') | float(0) %}
            {% set battery_now = cap * soc / 100 %}
            {% set threshold = states('input_number.export_optimizer_export_surplus_threshold_kwh') | float(1) %}
            {% set remaining_load = states('sensor.export_optimizer_remaining_solar_window_load_estimate') | float(0) %}
            {% set remaining_pv = states('sensor.solcast_pv_forecast_predpoved_zostavajuca_dnes') | float(0) %}
            {% set min_w = states('input_number.export_optimizer_min_export_power_w') | float(500) %}
            {% set max_w = states('input_number.export_optimizer_max_export_power_w') | float(3000) %}
            {% set battery_export_allowed = is_state('input_boolean.export_optimizer_allow_battery_early_export', 'on') %}
            {% set pv_power = states('sensor.inverter_pv_power') | float(0) %}
            {% set load_power = states('sensor.inverter_load_power') | float(0) %}
            {% set live_surplus_w = [pv_power - load_power - 200, 0] | max %}

            {% set neg = namespace(start=none, end=none, done=false) %}
            {% for p in prices %}
              {% set s = as_local(as_datetime(p.start)) %}
              {% set e = s + timedelta(minutes=15) %}
              {% if not neg.done and e > now_local and s < window_end %}
                {% if (p.price | float(999)) < floor %}
                  {% if neg.start is none %}
                    {% set neg.start = [s, now_local] | max %}
                  {% endif %}
                  {% set neg.end = [e, window_end] | min %}
                {% elif neg.start is not none %}
                  {% set neg.done = true %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if neg.start is none %}
              0
            {% else %}
              {% set mins = namespace(before_neg=0) %}
              {% for p in prices %}
                {% set s = as_local(as_datetime(p.start)) %}
                {% set e = s + timedelta(minutes=15) %}
                {% if e > now_local and s < neg.start and (p.price | float(999)) >= floor %}
                  {% set a = [s, now_local] | max %}
                  {% set b = [e, neg.start] | min %}
                  {% if b > a %}
                    {% set mins.before_neg = mins.before_neg + ((as_timestamp(b) - as_timestamp(a)) / 60) %}
                  {% endif %}
                {% endif %}
              {% endfor %}

              {% set pv = namespace(before_neg=0, during_neg=0) %}
              {% for f in forecast %}
                {% set fs = as_local(as_datetime(f.period_start)) %}
                {% if loop.index0 + 1 < forecast | count %}
                  {% set next = forecast[loop.index0 + 1] %}
                  {% set fe = as_local(as_datetime(next.period_start)) %}
                {% else %}
                  {% set fe = fs + timedelta(minutes=30) %}
                {% endif %}
                {% set kw = f.pv_estimate | float(0) %}

                {% set a1 = [fs, now_local] | max %}
                {% set b1 = [fe, neg.start] | min %}
                {% if b1 > a1 %}
                  {% set pv.before_neg = pv.before_neg + kw * ((as_timestamp(b1) - as_timestamp(a1)) / 3600) %}
                {% endif %}

                {% set a2 = [fs, neg.start] | max %}
                {% set b2 = [fe, neg.end] | min %}
                {% if b2 > a2 %}
                  {% set pv.during_neg = pv.during_neg + kw * ((as_timestamp(b2) - as_timestamp(a2)) / 3600) %}
                {% endif %}
              {% endfor %}

              {# Approximate daytime load evenly across the remaining solar window. #}
              {% set minutes_to_18 = ((as_timestamp(window_end) - as_timestamp(now_local)) / 60) %}
              {% set load_rate = remaining_load / minutes_to_18 if minutes_to_18 > 0 else 0 %}
              {% set load_before_neg = load_rate * mins.before_neg %}
              {% set neg_minutes = ((as_timestamp(neg.end) - as_timestamp(neg.start)) / 60) if neg.start is not none else 0 %}
              {% set load_during_neg = load_rate * neg_minutes %}

              {# Export needed before negative block so battery does not fill and spill during it. #}
              {% if neg.start is not none and mins.before_neg > 0 %}
                {% set net_before_neg = pv.before_neg - load_before_neg %}
                {% set net_during_neg = pv.during_neg - load_during_neg %}
                {% set net_until_18 = remaining_pv - remaining_load %}
                {% set total_excess = [battery_now + net_until_18 - cap + threshold, 0] | max %}
                {% set available_export_before_neg = max_w * mins.before_neg / 60 / 1000 %}
                {% set energy_needed_before_neg = [total_excess, available_export_before_neg] | min %}
                {% set pre_neg_w = energy_needed_before_neg * 1000 / (mins.before_neg / 60) %}
              {% else %}
                {% set pre_neg_w = 0 %}
              {% endif %}

              {% if battery_export_allowed %}
                {% set raw_w = pre_neg_w %}
              {% else %}
                {% set raw_w = [pre_neg_w, live_surplus_w] | min %}
              {% endif %}

              {% if raw_w <= 0 %}
                0
              {% else %}
                {{ [[raw_w, min_w] | max, max_w] | min | round(0) }}
              {% endif %}
            {% endif %}
          {% endif %}

  - trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: state
        entity_id:
          - sensor.export_optimizer_okte_spotova_cena
          - sensor.export_optimizer_recommended_export_power
          - sensor.export_optimizer_expected_surplus_today
          - sensor.export_optimizer_battery_target_soc
          - sensor.export_optimizer_negative_price_minutes_until_18
          - input_boolean.export_optimizer_export_guard_enabled
          - input_boolean.export_optimizer_allow_battery_early_export
    binary_sensor:
      - name: Export Optimizér - export pozadovany
        default_entity_id: binary_sensor.export_optimizer_export_wanted
        unique_id: export_optimizer_export_wanted
        state: >
          {% set enabled = is_state('input_boolean.export_optimizer_export_guard_enabled','on') %}
          {% set battery_export_allowed = is_state('input_boolean.export_optimizer_allow_battery_early_export', 'on') %}
          {% set price = states('sensor.export_optimizer_okte_spotova_cena') | float(999) %}
          {% set floor = states('input_number.export_optimizer_price_floor') | float(0) %}
          {% set soc = states('sensor.inverter_battery') | float(0) %}
          {% set target = states('sensor.export_optimizer_battery_target_soc') | float(95) %}
          {% set surplus = states('sensor.export_optimizer_expected_surplus_today') | float(0) %}
          {% set threshold = states('input_number.export_optimizer_export_surplus_threshold_kwh') | float(1) %}
          {% set export_w = states('sensor.export_optimizer_recommended_export_power') | float(0) %}
          {% set future_negative_today = states('sensor.export_optimizer_negative_price_minutes_until_18') | int(0) > 0 %}
          {% set soc_ok = soc > target + 2 if battery_export_allowed else true %}
          {{ enabled
             and now() >= today_at('07:00')
             and now() < today_at('18:00')
             and price >= floor
             and future_negative_today
             and soc_ok
             and surplus > threshold
             and export_w > 0 }}

  - trigger:
      - platform: state
        entity_id: sensor.inverter_total_energy_export
    sensor:
      - name: Export Optimizér - energia exportovana pocas zapornej ceny
        default_entity_id: sensor.export_optimizer_exported_energy_during_negative_spot_price
        unique_id: export_optimizer_exported_energy_during_negative_spot_price
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        state: >
          {% set current_export = trigger.to_state.state | float(0) %}
          {% set previous_export = this.attributes.last_export_kwh | default(trigger.from_state.state | float(0), true) | float(current_export) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 and previous_export > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% if states('sensor.export_optimizer_okte_spotova_cena') | float(999) < 0 %}
            {{ (previous_total + valid_delta) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ current_export }}"

      - name: Export Optimizér - energia exportovana automatizaciou
        default_entity_id: sensor.export_optimizer_exported_energy_by_automation
        unique_id: export_optimizer_exported_energy_by_automation
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        state: >
          {% set current_export = trigger.to_state.state | float(0) %}
          {% set previous_export = this.attributes.last_export_kwh | default(trigger.from_state.state | float(0), true) | float(current_export) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 and previous_export > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% if is_state('input_boolean.export_optimizer_export_guard_active', 'on') %}
            {{ (previous_total + valid_delta) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ current_export }}"

      - name: Export Optimizér - uspora automatizovaneho exportu
        default_entity_id: sensor.export_optimizer_automation_export_savings
        unique_id: export_optimizer_automation_export_savings
        unit_of_measurement: EUR
        device_class: monetary
        state_class: total
        state: >
          {% set current_export = trigger.to_state.state | float(0) %}
          {% set previous_export = this.attributes.last_export_kwh | default(trigger.from_state.state | float(0), true) | float(current_export) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 and previous_export > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% set buyout_price = states('sensor.cena_vykupu_elektriny') | float(0) %}
          {% if is_state('input_boolean.export_optimizer_export_guard_active', 'on') %}
            {{ (previous_total + (valid_delta * buyout_price)) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ current_export }}"
          current_buyout_price_eur_kwh: "{{ states('sensor.cena_vykupu_elektriny') | float(0) }}"

      - name: Export Optimizér - strateny potencial pri zapornej cene
        default_entity_id: sensor.export_optimizer_negative_price_wasted_potential
        unique_id: export_optimizer_negative_price_wasted_potential
        unit_of_measurement: EUR
        device_class: monetary
        state_class: total
        state: >
          {% set previous_export = this.attributes.last_export_kwh | default(trigger.from_state.state | float(0), true) | float(0) %}
          {% set current_export = trigger.to_state.state | float(0) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 and previous_export > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% set buyout_price = states('input_number.cena_elektriny_nocny_tarif') | float(0.052) * 0.88 %}
          {% if states('sensor.export_optimizer_okte_spotova_cena') | float(999) < 0 %}
            {{ (previous_total + (valid_delta * buyout_price)) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ current_export }}"
          hypothetical_buyout_price_eur_kwh: "{{ states('input_number.cena_elektriny_nocny_tarif') | float(0.052) * 0.88 }}"

automation:
  - alias: Export Optimizér Pozicovna - zaznamenat zaciatok solarneho okna
    id: export_optimizer_pozicovna_record_solar_window_start
    description: Zapise spotrebu domu o 07:00, aby sa dala vypocitat spotreba iba pocas solarneho okna.
    mode: single
    trigger:
      - platform: time
        at: "07:00:00"
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.export_optimizer_solar_window_start_load_kwh
        data:
          value: "{{ states('sensor.inverter_today_load_consumption') | float(0) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.export_optimizer_solar_window_start_recorded
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - alias: Export Optimizér Pozicovna - export iba ked je bezpecny
    id: export_optimizer_pozicovna_export_only_when_safe
    description: Prepina menic do Export First iba vtedy, ked treba vytvorit miesto v baterii pred zapornou spotovou cenou.
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.export_optimizer_export_wanted
          - sensor.export_optimizer_okte_spotova_cena
          - sensor.export_optimizer_recommended_export_power
          - input_boolean.export_optimizer_export_guard_enabled
          - input_boolean.export_optimizer_allow_battery_early_export
          - select.inverter_work_mode
      - platform: numeric_state
        entity_id: sensor.inverter_battery
        above: 99
      - platform: homeassistant
        event: start
    action:
      - choose:
        - conditions:
            - condition: numeric_state
              entity_id: sensor.inverter_battery
              above: 99
            - condition: state
              entity_id: switch.inverter_export_surplus
              state:
                - "on"
            - condition: state
              entity_id: select.inverter_work_mode
              state:
                - Zero Export To CT
          sequence:
            - target:
                entity_id: number.inverter_export_surplus_power
              data:
                value: >-
                  {{ [states('number.solarny_menic_grid_max_export_power') |
                  float(0), states('input_number.export_optimizer_max_export_power_w') |
                  float(0) ] | min }}
              action: number.set_value
          - conditions:
              - condition: state
                entity_id: input_boolean.export_optimizer_export_guard_enabled
                state: "off"
              - condition: state
                entity_id: input_boolean.export_optimizer_export_guard_active
                state: "on"
            sequence:
              - if:
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: select.inverter_work_mode
                        state: "Zero Export To CT"
                then:
                  - action: select.select_option
                    target:
                      entity_id: select.inverter_work_mode
                    data:
                      option: "Zero Export To CT"
              - alias: Povoliť posielanie do siete pri plnej batérii
                if:
                  - condition: numeric_state
                    entity_id: sensor.inverter_battery
                    above: 99
                then:
                  - target:
                      entity_id: number.inverter_export_surplus_power
                    data:
                      value: >-
                        {{ [states('number.solarny_menic_grid_max_export_power') |
                        float(0), states('input_number.export_optimizer_max_export_power_w') |
                        float(0) ] | min }}
                    action: number.set_value
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.export_optimizer_export_guard_active
          - conditions:
              - condition: numeric_state
                entity_id: sensor.export_optimizer_okte_spotova_cena
                below: 0
            sequence:
              - if:
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: select.inverter_work_mode
                        state: "Zero Export To CT"
                then:
                  - action: select.select_option
                    target:
                      entity_id: select.inverter_work_mode
                    data:
                      option: "Zero Export To CT"
              - alias: Povoliť posielanie do siete pri plnej batérii
                if:
                  - condition: numeric_state
                    entity_id: sensor.inverter_battery
                    above: 99
                then:
                  - target:
                      entity_id: number.inverter_export_surplus_power
                    data:
                      value: >-
                        {{ [states('number.solarny_menic_grid_max_export_power') |
                        float(0), states('input_number.export_optimizer_max_export_power_w') |
                        float(0) ] | min }}
                    action: number.set_value
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.export_optimizer_export_guard_active
          - conditions:
              - condition: state
                entity_id: input_boolean.export_optimizer_export_guard_enabled
                state: "on"
              - condition: state
                entity_id: binary_sensor.export_optimizer_export_wanted
                state: "on"
            sequence:
              - variables:
                  recommended_w: "{{ states('sensor.export_optimizer_recommended_export_power') | float(0) }}"
                  live_surplus_w: >
                    {{ [states('sensor.inverter_pv_power') | float(0) -
                        states('sensor.inverter_load_power') | float(0) - 200, 0] | max }}
                  max_w: "{{ states('input_number.export_optimizer_max_export_power_w') | float(3000) }}"
                  export_power_target: >
                    {% if states('sensor.inverter_battery') | float(0) >= 99 %}
                      {{ [[recommended_w | float(0), live_surplus_w | float(0)] | max, max_w | float(3000)] | min }}
                    {% else %}
                      {{ recommended_w | float(0) }}
                    {% endif %}
              - if:
                  - condition: template
                    value_template: >
                      {{ (states('number.inverter_export_surplus_power') | float(0) -
                          export_power_target | float(0)) | abs > 50 }}
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.inverter_export_surplus_power
                    data:
                      value: "{{ export_power_target | float(0) }}"
              - if:
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: select.inverter_work_mode
                        state: "Export First"
                then:
                  - action: select.select_option
                    target:
                      entity_id: select.inverter_work_mode
                    data:
                      option: "Export First"
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.export_optimizer_export_guard_active
          - conditions:
              - condition: state
                entity_id: input_boolean.export_optimizer_export_guard_active
                state: "on"
            sequence:
              - if:
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: select.inverter_work_mode
                        state: "Zero Export To CT"
                then:
                  - action: select.select_option
                    target:
                      entity_id: select.inverter_work_mode
                    data:
                      option: "Zero Export To CT"
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.export_optimizer_export_guard_active
