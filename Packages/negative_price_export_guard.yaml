# Home Assistant package: Ochrana exportu pri zapornych spotovych cenach
#
# Subor je urceny na vlozenie do adresara packages/ v Home Assistant.
# Slovenske nazvy entit su zobrazovane nazvy. default_entity_id drzi stabilne entity_id,
# aby sablony a automatizacie fungovali aj po premenovani nazvu v UI.
#
# Externe entity su definovane v sekcii input_text nizsie. Pri inom menici alebo inom nazvoslovi
# staci zmenit hodnoty tychto helperov, pripadne upravit hodnoty initial pred prvym nasadenim.

input_text:
  export_optimizer_entity_okte_prices:
    name: Export Optimizer - entita OKTE cien
    icon: mdi:currency-eur
    max: 255
    initial: sensor.okte_ceny_elektriny_prices

  export_optimizer_entity_solcast_forecast_today:
    name: Export Optimizer - entita Solcast predpovede dnes
    icon: mdi:weather-sunny
    max: 255
    initial: sensor.solcast_pv_forecast_predpoved_dnes

  export_optimizer_entity_today_load_consumption:
    name: Export Optimizer - entita dennej spotreby domu
    icon: mdi:home-lightning-bolt
    max: 255
    initial: sensor.inverter_today_load_consumption

  export_optimizer_entity_total_energy_export:
    name: Export Optimizer - entita celkoveho exportu
    icon: mdi:transmission-tower-export
    max: 255
    initial: sensor.inverter_total_energy_export

  export_optimizer_entity_today_production:
    name: Export Optimizer - entita dennej PV vyroby
    icon: mdi:solar-power-variant
    max: 255
    initial: sensor.inverter_today_production

  export_optimizer_entity_battery_soc:
    name: Export Optimizer - entita SOC baterie
    icon: mdi:battery
    max: 255
    initial: sensor.inverter_battery

  export_optimizer_entity_battery_capacity:
    name: Export Optimizer - entita kapacity baterie
    icon: mdi:battery-high
    max: 255
    initial: sensor.inverter_battery_capacity

  export_optimizer_entity_pv_power:
    name: Export Optimizer - entita aktualneho PV vykonu
    icon: mdi:solar-power
    max: 255
    initial: sensor.inverter_pv_power

  export_optimizer_entity_load_power:
    name: Export Optimizer - entita aktualnej spotreby domu
    icon: mdi:home-lightning-bolt-outline
    max: 255
    initial: sensor.inverter_load_power

  export_optimizer_entity_inverter_work_mode:
    name: Export Optimizer - entita rezimu menica
    icon: mdi:select
    max: 255
    initial: select.inverter_work_mode

  export_optimizer_entity_export_surplus_power:
    name: Export Optimizer - entita limitu exportu
    icon: mdi:transmission-tower
    max: 255
    initial: number.inverter_export_surplus_power

  export_optimizer_entity_energy_value_helper:
    name: Export Optimizer - entita hodnoty energie
    icon: mdi:cash
    max: 255
    initial: input_number.cena_elektriny_nocny_tarif

  export_optimizer_mode_export_first:
    name: Export Optimizer - nazov rezimu Export First
    icon: mdi:export
    max: 255
    initial: Export First

  export_optimizer_mode_zero_export:
    name: Export Optimizer - nazov rezimu Zero Export To CT
    icon: mdi:transmission-tower-off
    max: 255
    initial: Zero Export To CT

input_datetime:
  export_optimizer_solar_window_start_recorded:
    name: Export Optimizer - cas zaznamu rannej spotreby
    has_date: true
    has_time: true

input_number:
  export_optimizer_solar_window_start_load_kwh:
    name: Export Optimizer - ranna spotreba domu
    min: 0
    max: 100
    step: 0.01
    unit_of_measurement: kWh
    mode: box

  export_optimizer_min_reserve_soc:
    name: Export Optimizer - minimalna rezerva baterie
    min: 10
    max: 90
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 40

  export_optimizer_consumption_margin_kwh:
    name: Export Optimizer - rezerva odhadu spotreby
    min: 0
    max: 10
    step: 0.5
    unit_of_measurement: kWh
    mode: slider
    initial: 2

  export_optimizer_export_surplus_threshold_kwh:
    name: Export Optimizer - minimalny ocakavany prebytok
    min: 0
    max: 10
    step: 0.25
    unit_of_measurement: kWh
    mode: slider
    initial: 1

  export_optimizer_price_floor:
    name: Export Optimizer - minimalna spotova cena pre export
    min: -50
    max: 50
    step: 0.1
    unit_of_measurement: EUR/MWh
    mode: box
    initial: 0

  export_optimizer_min_export_power_w:
    name: Export Optimizer - minimalny riadeny vykon exportu
    min: 0
    max: 5000
    step: 100
    unit_of_measurement: W
    mode: slider
    initial: 500

  export_optimizer_max_export_power_w:
    name: Export Optimizer - maximalny riadeny vykon exportu
    min: 100
    max: 10000
    step: 100
    unit_of_measurement: W
    mode: slider
    initial: 3000

input_boolean:
  export_optimizer_export_guard_enabled:
    name: Export Optimizer - ochrana exportu zapnuta
    icon: mdi:shield-sun
    initial: true

  export_optimizer_export_guard_active:
    name: Export Optimizer - riadeny export aktivny
    icon: mdi:transmission-tower-export
    initial: false

  export_optimizer_allow_battery_early_export:
    name: Export Optimizer - povolit skory export z baterie
    icon: mdi:battery-arrow-down
    initial: true

template:
  - trigger:
      - platform: time
        at: "18:00:00"
    sensor:
      - name: Export Optimizer - priemer spotreby v solarnom okne 7d
        default_entity_id: sensor.export_optimizer_solar_window_load_7d_average
        unique_id: export_optimizer_solar_window_load_7d_average
        unit_of_measurement: kWh
        state: >
          {% set load_entity = states('input_text.export_optimizer_entity_today_load_consumption') %}
          {% set recorded = as_datetime(states('input_datetime.export_optimizer_solar_window_start_recorded')) %}
          {% set valid = recorded is not none and recorded.date() == now().date() %}
          {% set start = states('input_number.export_optimizer_solar_window_start_load_kwh') | float(0) %}
          {% set current = states(load_entity) | float(0) %}
          {% set sample = [current - start, 0] | max if valid else 0 %}
          {% set old = (this.attributes.samples_csv | default('', true)).split(',') | reject('eq','') | map('float') | list %}
          {% set new = ([sample] + old)[:7] if sample > 0 else old %}
          {{ ((new | sum) / (new | count)) | round(2) if new | count > 0 else 6 }}
        attributes:
          samples_csv: >
            {% set load_entity = states('input_text.export_optimizer_entity_today_load_consumption') %}
            {% set recorded = as_datetime(states('input_datetime.export_optimizer_solar_window_start_recorded')) %}
            {% set valid = recorded is not none and recorded.date() == now().date() %}
            {% set start = states('input_number.export_optimizer_solar_window_start_load_kwh') | float(0) %}
            {% set current = states(load_entity) | float(0) %}
            {% set sample = [current - start, 0] | max if valid else 0 %}
            {% set old = (this.attributes.samples_csv | default('', true)).split(',') | reject('eq','') | map('float') | list %}
            {% set new = ([sample] + old)[:7] if sample > 0 else old %}
            {{ new | join(',') }}

  - trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_text.export_optimizer_entity_okte_prices
          - input_text.export_optimizer_entity_energy_value_helper
    sensor:
      - name: Export Optimizer OKTE spotova cena
        default_entity_id: sensor.export_optimizer_okte_spotova_cena
        unique_id: export_optimizer_okte_spot_price
        unit_of_measurement: EUR/MWh
        state: >
          {% set okte_entity = states('input_text.export_optimizer_entity_okte_prices') %}
          {% set prices = state_attr(okte_entity, 'prices') or [] %}
          {% set now_local = now() %}
          {% set ns = namespace(price=none) %}
          {% for p in prices %}
            {% set start_local = as_local(as_datetime(p.start)) %}
            {% if start_local <= now_local and now_local < start_local + timedelta(minutes=15) %}
              {% set ns.price = p.price | float %}
            {% endif %}
          {% endfor %}
          {{ ns.price if ns.price is not none else states(okte_entity) | float(999) }}
        attributes:
          source: okte_prices_attribute
          source_entity: "{{ states('input_text.export_optimizer_entity_okte_prices') }}"

      - name: Cena vykupu elektriny
        # Cena vykupu je 0 ked je spotova cena zaporna, inak je to konzervativna hodnota zalozena na nocnom tarife
        # pocas vikendu (teda s 12% zlavou), aby sme vedeli odhadnut strateny potencial pri zapornych cenach.
        default_entity_id: sensor.cena_vykupu_elektriny
        unique_id: export_optimizer_solar_sell_price
        unit_of_measurement: EUR/kWh
        state: >
          {% set energy_value_entity = states('input_text.export_optimizer_entity_energy_value_helper') %}
          {% if states('sensor.export_optimizer_okte_spotova_cena') | float(0) >= 0 %}
            {% set price = states(energy_value_entity) | float(0.052) * 0.88 %}
          {% else %}
            {% set price = 0 %}
          {% endif %}
          {{ price }}
        attributes:
          source_entity: "{{ states('input_text.export_optimizer_entity_energy_value_helper') }}"

  - trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.export_optimizer_okte_spotova_cena
          - input_text.export_optimizer_entity_okte_prices
          - input_text.export_optimizer_entity_solcast_forecast_today
          - input_text.export_optimizer_entity_today_load_consumption
          - input_text.export_optimizer_entity_today_production
          - input_text.export_optimizer_entity_battery_soc
          - input_text.export_optimizer_entity_battery_capacity
          - input_text.export_optimizer_entity_pv_power
          - input_text.export_optimizer_entity_load_power
          - input_boolean.export_optimizer_allow_battery_early_export
          - input_number.export_optimizer_price_floor
          - input_number.export_optimizer_min_export_power_w
          - input_number.export_optimizer_max_export_power_w
          - input_number.export_optimizer_consumption_margin_kwh
          - input_number.export_optimizer_export_surplus_threshold_kwh
          - input_number.export_optimizer_min_reserve_soc
    sensor:
      - name: Export Optimizer - zostavajuca PV predpoved dnes
        default_entity_id: sensor.export_optimizer_remaining_pv_forecast_today
        unique_id: export_optimizer_remaining_pv_forecast_today
        unit_of_measurement: kWh
        state: >
          {% set forecast_entity = states('input_text.export_optimizer_entity_solcast_forecast_today') %}
          {% set production_entity = states('input_text.export_optimizer_entity_today_production') %}
          {% set forecast = states(forecast_entity) | float(0) %}
          {% set actual = states(production_entity) | float(0) %}
          {{ [forecast - actual, 0] | max | round(2) }}

      - name: Export Optimizer - spotreba v solarnom okne dnes
        default_entity_id: sensor.export_optimizer_solar_window_load_today
        unique_id: export_optimizer_solar_window_load_today
        unit_of_measurement: kWh
        state: >
          {% set load_entity = states('input_text.export_optimizer_entity_today_load_consumption') %}
          {% set recorded = as_datetime(states('input_datetime.export_optimizer_solar_window_start_recorded')) %}
          {% set valid = recorded is not none and recorded.date() == now().date() %}
          {% if now() < today_at('07:00') or not valid %}
            0
          {% else %}
            {% set start = states('input_number.export_optimizer_solar_window_start_load_kwh') | float(0) %}
            {% set current = states(load_entity) | float(0) %}
            {{ [current - start, 0] | max | round(2) }}
          {% endif %}

      - name: Export Optimizer - odhad zostavajucej spotreby v solarnom okne
        default_entity_id: sensor.export_optimizer_remaining_solar_window_load_estimate
        unique_id: export_optimizer_remaining_solar_window_load_estimate
        unit_of_measurement: kWh
        state: >
          {% set avg = states('sensor.export_optimizer_solar_window_load_7d_average') | float(6) %}
          {% set margin = states('input_number.export_optimizer_consumption_margin_kwh') | float(2) %}
          {% set used = states('sensor.export_optimizer_solar_window_load_today') | float(0) %}
          {% if now() >= today_at('18:00') %}
            0
          {% else %}
            {{ [avg + margin - used, 0] | max | round(2) }}
          {% endif %}

      - name: Export Optimizer - minuty zapornej ceny do 18:00
        default_entity_id: sensor.export_optimizer_negative_price_minutes_until_18
        unique_id: export_optimizer_negative_price_minutes_until_18
        unit_of_measurement: min
        state: >
          {% set okte_entity = states('input_text.export_optimizer_entity_okte_prices') %}
          {% set prices = state_attr(okte_entity, 'prices') or [] %}
          {% set now_ts = as_timestamp(now()) %}
          {% set horizon = as_timestamp(today_at('18:00')) %}
          {% set floor = states('input_number.export_optimizer_price_floor') | float(0) %}
          {% set ns = namespace(minutes=0) %}
          {% for p in prices %}
            {% set s = as_timestamp(as_datetime(p.start)) %}
            {% if s >= now_ts and s < horizon and (p.price | float(999)) < floor %}
              {% set ns.minutes = ns.minutes + 15 %}
            {% endif %}
          {% endfor %}
          {{ ns.minutes }}

      - name: Export Optimizer - cielove SOC baterie
        default_entity_id: sensor.export_optimizer_battery_target_soc
        unique_id: export_optimizer_battery_target_soc
        unit_of_measurement: "%"
        state: >
          {% set cap_entity = states('input_text.export_optimizer_entity_battery_capacity') %}
          {% set cap = states(cap_entity) | float(20) %}
          {% set reserve = states('input_number.export_optimizer_min_reserve_soc') | float(40) %}
          {% set remaining_load = states('sensor.export_optimizer_remaining_solar_window_load_estimate') | float(0) %}
          {% set remaining_pv = states('sensor.export_optimizer_remaining_pv_forecast_today') | float(0) %}
          {% set uncovered_load = [remaining_load - remaining_pv, 0] | max %}
          {{ [reserve + (uncovered_load / cap * 100), 95] | min | round(0) }}

      - name: Export Optimizer - ocakavany prebytok dnes
        default_entity_id: sensor.export_optimizer_expected_surplus_today
        unique_id: export_optimizer_expected_surplus_today
        unit_of_measurement: kWh
        state: >
          {% set cap_entity = states('input_text.export_optimizer_entity_battery_capacity') %}
          {% set soc_entity = states('input_text.export_optimizer_entity_battery_soc') %}
          {% set cap = states(cap_entity) | float(20) %}
          {% set soc = states(soc_entity) | float(0) %}
          {% set reserve = states('input_number.export_optimizer_min_reserve_soc') | float(40) %}
          {% set battery_above_reserve = [((soc - reserve) / 100 * cap), 0] | max %}
          {% set remaining_pv = states('sensor.export_optimizer_remaining_pv_forecast_today') | float(0) %}
          {% set remaining_load = states('sensor.export_optimizer_remaining_solar_window_load_estimate') | float(0) %}
          {{ (battery_above_reserve + remaining_pv - remaining_load) | round(2) }}

      - name: Export Optimizer - odporucany vykon exportu
        default_entity_id: sensor.export_optimizer_recommended_export_power
        unique_id: export_optimizer_recommended_export_power
        unit_of_measurement: W
        state: >
          {% set price = states('sensor.export_optimizer_okte_spotova_cena') | float(999) %}
          {% set floor = states('input_number.export_optimizer_price_floor') | float(0) %}
          {% if price < floor or now() < today_at('07:00') or now() >= today_at('18:00') %}
            0
          {% else %}
            {% set okte_entity = states('input_text.export_optimizer_entity_okte_prices') %}
            {% set forecast_entity = states('input_text.export_optimizer_entity_solcast_forecast_today') %}
            {% set cap_entity = states('input_text.export_optimizer_entity_battery_capacity') %}
            {% set soc_entity = states('input_text.export_optimizer_entity_battery_soc') %}
            {% set pv_power_entity = states('input_text.export_optimizer_entity_pv_power') %}
            {% set load_power_entity = states('input_text.export_optimizer_entity_load_power') %}
            {% set prices = state_attr(okte_entity, 'prices') or [] %}
            {% set forecast = state_attr(forecast_entity, 'detailedForecast') or [] %}
            {% set now_local = now() %}
            {% set window_end = today_at('18:00') %}
            {% set cap = states(cap_entity) | float(20) %}
            {% set soc = states(soc_entity) | float(0) %}
            {% set battery_now = cap * soc / 100 %}
            {% set threshold = states('input_number.export_optimizer_export_surplus_threshold_kwh') | float(1) %}
            {% set remaining_load = states('sensor.export_optimizer_remaining_solar_window_load_estimate') | float(0) %}
            {% set min_w = states('input_number.export_optimizer_min_export_power_w') | float(500) %}
            {% set max_w = states('input_number.export_optimizer_max_export_power_w') | float(3000) %}
            {% set battery_export_allowed = is_state('input_boolean.export_optimizer_allow_battery_early_export', 'on') %}
            {% set pv_power = states(pv_power_entity) | float(0) %}
            {% set load_power = states(load_power_entity) | float(0) %}
            {% set live_surplus_w = [pv_power - load_power - 200, 0] | max %}

            {% set neg = namespace(start=none, end=none, done=false) %}
            {% for p in prices %}
              {% set s = as_local(as_datetime(p.start)) %}
              {% set e = s + timedelta(minutes=15) %}
              {% if not neg.done and e > now_local and s < window_end %}
                {% if (p.price | float(999)) < floor %}
                  {% if neg.start is none %}
                    {% set neg.start = [s, now_local] | max %}
                  {% endif %}
                  {% set neg.end = [e, window_end] | min %}
                {% elif neg.start is not none %}
                  {% set neg.done = true %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if neg.start is none %}
              0
            {% else %}
              {% set mins = namespace(before_neg=0) %}
              {% for p in prices %}
                {% set s = as_local(as_datetime(p.start)) %}
                {% set e = s + timedelta(minutes=15) %}
                {% if e > now_local and s < neg.start and (p.price | float(999)) >= floor %}
                  {% set a = [s, now_local] | max %}
                  {% set b = [e, neg.start] | min %}
                  {% if b > a %}
                    {% set mins.before_neg = mins.before_neg + ((as_timestamp(b) - as_timestamp(a)) / 60) %}
                  {% endif %}
                {% endif %}
              {% endfor %}

              {% set pv = namespace(before_neg=0, during_neg=0) %}
              {% for f in forecast %}
                {% set fs = as_local(as_datetime(f.period_start)) %}
                {% if loop.index0 + 1 < forecast | count %}
                  {% set next = forecast[loop.index0 + 1] %}
                  {% set fe = as_local(as_datetime(next.period_start)) %}
                {% else %}
                  {% set fe = fs + timedelta(minutes=30) %}
                {% endif %}
                {% set kw = f.pv_estimate | float(0) %}

                {% set a1 = [fs, now_local] | max %}
                {% set b1 = [fe, neg.start] | min %}
                {% if b1 > a1 %}
                  {% set pv.before_neg = pv.before_neg + kw * ((as_timestamp(b1) - as_timestamp(a1)) / 3600) %}
                {% endif %}

                {% set a2 = [fs, neg.start] | max %}
                {% set b2 = [fe, neg.end] | min %}
                {% if b2 > a2 %}
                  {% set pv.during_neg = pv.during_neg + kw * ((as_timestamp(b2) - as_timestamp(a2)) / 3600) %}
                {% endif %}
              {% endfor %}

              {% set minutes_to_18 = ((as_timestamp(window_end) - as_timestamp(now_local)) / 60) %}
              {% set load_rate = remaining_load / minutes_to_18 if minutes_to_18 > 0 else 0 %}
              {% set load_before_neg = load_rate * mins.before_neg %}
              {% set neg_minutes = ((as_timestamp(neg.end) - as_timestamp(neg.start)) / 60) %}
              {% set load_during_neg = load_rate * neg_minutes %}

              {% if mins.before_neg > 0 %}
                {% set net_before_neg = pv.before_neg - load_before_neg %}
                {% set net_during_neg = pv.during_neg - load_during_neg %}
                {% set energy_needed_before_neg = [battery_now + net_before_neg + net_during_neg - cap + threshold, 0] | max %}
                {% set pre_neg_w = energy_needed_before_neg * 1000 / (mins.before_neg / 60) %}
              {% else %}
                {% set pre_neg_w = 0 %}
              {% endif %}

              {% if battery_export_allowed %}
                {% set raw_w = pre_neg_w %}
              {% else %}
                {% set raw_w = [pre_neg_w, live_surplus_w] | min %}
              {% endif %}

              {% if raw_w <= 0 %}
                0
              {% elif battery_export_allowed %}
                {{ [[raw_w, min_w] | max, max_w] | min | round(0) }}
              {% else %}
                {{ [raw_w, max_w] | min | round(0) }}
              {% endif %}
            {% endif %}
          {% endif %}

  - trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.export_optimizer_okte_spotova_cena
          - sensor.export_optimizer_recommended_export_power
          - sensor.export_optimizer_expected_surplus_today
          - sensor.export_optimizer_battery_target_soc
          - sensor.export_optimizer_negative_price_minutes_until_18
          - input_text.export_optimizer_entity_battery_soc
          - input_boolean.export_optimizer_export_guard_enabled
          - input_boolean.export_optimizer_allow_battery_early_export
    binary_sensor:
      - name: Export Optimizer - export pozadovany
        default_entity_id: binary_sensor.export_optimizer_export_wanted
        unique_id: export_optimizer_export_wanted
        state: >
          {% set soc_entity = states('input_text.export_optimizer_entity_battery_soc') %}
          {% set enabled = is_state('input_boolean.export_optimizer_export_guard_enabled','on') %}
          {% set battery_export_allowed = is_state('input_boolean.export_optimizer_allow_battery_early_export', 'on') %}
          {% set price = states('sensor.export_optimizer_okte_spotova_cena') | float(999) %}
          {% set floor = states('input_number.export_optimizer_price_floor') | float(0) %}
          {% set soc = states(soc_entity) | float(0) %}
          {% set target = states('sensor.export_optimizer_battery_target_soc') | float(95) %}
          {% set surplus = states('sensor.export_optimizer_expected_surplus_today') | float(0) %}
          {% set threshold = states('input_number.export_optimizer_export_surplus_threshold_kwh') | float(1) %}
          {% set export_w = states('sensor.export_optimizer_recommended_export_power') | float(0) %}
          {% set future_negative_today = states('sensor.export_optimizer_negative_price_minutes_until_18') | int(0) > 0 %}
          {% set soc_ok = soc > target + 2 if battery_export_allowed else true %}
          {{ enabled
             and now() >= today_at('07:00')
             and now() < today_at('18:00')
             and price >= floor
             and future_negative_today
             and soc_ok
             and surplus > threshold
             and export_w > 0 }}

  - trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_text.export_optimizer_entity_total_energy_export
          - input_text.export_optimizer_entity_energy_value_helper
          - sensor.export_optimizer_okte_spotova_cena
          - input_boolean.export_optimizer_export_guard_active
    sensor:
      - name: Export Optimizer - energia exportovana pocas zapornej ceny
        default_entity_id: sensor.export_optimizer_exported_energy_during_negative_spot_price
        unique_id: export_optimizer_exported_energy_during_negative_spot_price
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        state: >
          {% set export_entity = states('input_text.export_optimizer_entity_total_energy_export') %}
          {% set current_export = states(export_entity) | float(0) %}
          {% set previous_export = this.attributes.last_export_kwh | default(current_export, true) | float(current_export) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% if states('sensor.export_optimizer_okte_spotova_cena') | float(999) < 0 %}
            {{ (previous_total + valid_delta) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ states(states('input_text.export_optimizer_entity_total_energy_export')) | float(0) }}"
          source_entity: "{{ states('input_text.export_optimizer_entity_total_energy_export') }}"

      - name: Export Optimizer - energia exportovana automatizaciou
        default_entity_id: sensor.export_optimizer_exported_energy_by_automation
        unique_id: export_optimizer_exported_energy_by_automation
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        state: >
          {% set export_entity = states('input_text.export_optimizer_entity_total_energy_export') %}
          {% set current_export = states(export_entity) | float(0) %}
          {% set previous_export = this.attributes.last_export_kwh | default(current_export, true) | float(current_export) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% if is_state('input_boolean.export_optimizer_export_guard_active', 'on') %}
            {{ (previous_total + valid_delta) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ states(states('input_text.export_optimizer_entity_total_energy_export')) | float(0) }}"
          source_entity: "{{ states('input_text.export_optimizer_entity_total_energy_export') }}"

      - name: Export Optimizer - uspora automatizovaneho exportu
        default_entity_id: sensor.export_optimizer_automation_export_savings
        unique_id: export_optimizer_automation_export_savings
        unit_of_measurement: EUR
        device_class: monetary
        state_class: total
        state: >
          {% set export_entity = states('input_text.export_optimizer_entity_total_energy_export') %}
          {% set current_export = states(export_entity) | float(0) %}
          {% set previous_export = this.attributes.last_export_kwh | default(current_export, true) | float(current_export) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% set buyout_price = states('sensor.cena_vykupu_elektriny') | float(0) %}
          {% if is_state('input_boolean.export_optimizer_export_guard_active', 'on') %}
            {{ (previous_total + (valid_delta * buyout_price)) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ states(states('input_text.export_optimizer_entity_total_energy_export')) | float(0) }}"
          current_buyout_price_eur_kwh: "{{ states('sensor.cena_vykupu_elektriny') | float(0) }}"
          source_entity: "{{ states('input_text.export_optimizer_entity_total_energy_export') }}"

      - name: Export Optimizer - strateny potencial pri zapornej cene
        default_entity_id: sensor.export_optimizer_negative_price_wasted_potential
        unique_id: export_optimizer_negative_price_wasted_potential
        unit_of_measurement: EUR
        device_class: monetary
        state_class: total
        state: >
          {% set export_entity = states('input_text.export_optimizer_entity_total_energy_export') %}
          {% set energy_value_entity = states('input_text.export_optimizer_entity_energy_value_helper') %}
          {% set current_export = states(export_entity) | float(0) %}
          {% set previous_export = this.attributes.last_export_kwh | default(current_export, true) | float(current_export) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% set buyout_price = states(energy_value_entity) | float(0.052) * 0.88 %}
          {% if states('sensor.export_optimizer_okte_spotova_cena') | float(999) < 0 %}
            {{ (previous_total + (valid_delta * buyout_price)) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ states(states('input_text.export_optimizer_entity_total_energy_export')) | float(0) }}"
          hypothetical_buyout_price_eur_kwh: "{{ states(states('input_text.export_optimizer_entity_energy_value_helper')) | float(0.052) * 0.88 }}"
          source_entity: "{{ states('input_text.export_optimizer_entity_total_energy_export') }}"

automation:
  - alias: Export Optimizer Pozicovna - zaznamenat zaciatok solarneho okna
    id: export_optimizer_pozicovna_record_solar_window_start
    description: Zapise spotrebu domu o 07:00, aby sa dala vypocitat spotreba iba pocas solarneho okna.
    mode: single
    trigger:
      - platform: time
        at: "07:00:00"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.export_optimizer_solar_window_start_load_kwh
        data:
          value: "{{ states(states('input_text.export_optimizer_entity_today_load_consumption')) | float(0) }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.export_optimizer_solar_window_start_recorded
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - alias: Export Optimizer Pozicovna - export iba ked je bezpecny
    id: export_optimizer_pozicovna_export_only_when_safe
    description: Prepina menic do Export First iba vtedy, ked treba vytvorit miesto v baterii pred zapornou spotovou cenou.
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: state
        entity_id:
          - binary_sensor.export_optimizer_export_wanted
          - sensor.export_optimizer_okte_spotova_cena
          - sensor.export_optimizer_recommended_export_power
          - input_boolean.export_optimizer_export_guard_enabled
          - input_boolean.export_optimizer_allow_battery_early_export
          - input_text.export_optimizer_entity_inverter_work_mode
          - input_text.export_optimizer_entity_export_surplus_power
          - input_text.export_optimizer_mode_export_first
          - input_text.export_optimizer_mode_zero_export
      - platform: homeassistant
        event: start
    action:
      - variables:
          work_mode_entity: "{{ states('input_text.export_optimizer_entity_inverter_work_mode') }}"
          export_power_entity: "{{ states('input_text.export_optimizer_entity_export_surplus_power') }}"
          soc_entity: "{{ states('input_text.export_optimizer_entity_battery_soc') }}"
          pv_power_entity: "{{ states('input_text.export_optimizer_entity_pv_power') }}"
          load_power_entity: "{{ states('input_text.export_optimizer_entity_load_power') }}"
          export_first_mode: "{{ states('input_text.export_optimizer_mode_export_first') }}"
          zero_export_mode: "{{ states('input_text.export_optimizer_mode_zero_export') }}"
          price_floor: "{{ states('input_number.export_optimizer_price_floor') | float(0) }}"
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.export_optimizer_export_guard_enabled
                state: "off"
              - condition: state
                entity_id: input_boolean.export_optimizer_export_guard_active
                state: "on"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ states(work_mode_entity) != zero_export_mode }}"
                then:
                  - service: select.select_option
                    data:
                      entity_id: "{{ work_mode_entity }}"
                      option: "{{ zero_export_mode }}"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.export_optimizer_export_guard_active

          - conditions:
              - condition: template
                value_template: "{{ states('sensor.export_optimizer_okte_spotova_cena') | float(999) < price_floor | float(0) }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ states(work_mode_entity) != zero_export_mode }}"
                then:
                  - service: select.select_option
                    data:
                      entity_id: "{{ work_mode_entity }}"
                      option: "{{ zero_export_mode }}"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.export_optimizer_export_guard_active

          - conditions:
              - condition: state
                entity_id: input_boolean.export_optimizer_export_guard_enabled
                state: "on"
              - condition: state
                entity_id: binary_sensor.export_optimizer_export_wanted
                state: "on"
            sequence:
              - variables:
                  recommended_w: "{{ states('sensor.export_optimizer_recommended_export_power') | float(0) }}"
                  live_surplus_w: >
                    {{ [states(pv_power_entity) | float(0) - states(load_power_entity) | float(0) - 200, 0] | max }}
                  max_w: "{{ states('input_number.export_optimizer_max_export_power_w') | float(3000) }}"
                  export_power_target: >
                    {% if states(soc_entity) | float(0) >= 99.5 %}
                      {{ [[recommended_w | float(0), live_surplus_w | float(0)] | max, max_w | float(3000)] | min }}
                    {% else %}
                      {{ recommended_w | float(0) }}
                    {% endif %}
              - if:
                  - condition: template
                    value_template: >
                      {{ (states(export_power_entity) | float(0) -
                          export_power_target | float(0)) | abs > 50 }}
                then:
                  - service: number.set_value
                    data:
                      entity_id: "{{ export_power_entity }}"
                      value: "{{ export_power_target | float(0) }}"
              - if:
                  - condition: template
                    value_template: "{{ states(work_mode_entity) != export_first_mode }}"
                then:
                  - service: select.select_option
                    data:
                      entity_id: "{{ work_mode_entity }}"
                      option: "{{ export_first_mode }}"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.export_optimizer_export_guard_active

          - conditions:
              - condition: state
                entity_id: input_boolean.export_optimizer_export_guard_enabled
                state: "on"
              - condition: template
                value_template: "{{ states(work_mode_entity) == zero_export_mode }}"
              - condition: template
                value_template: "{{ states(soc_entity) | float(0) >= 99.5 }}"
              - condition: template
                value_template: "{{ states('sensor.export_optimizer_okte_spotova_cena') | float(999) >= price_floor | float(0) }}"
            sequence:
              - if:
                  - condition: template
                    value_template: >
                      {{ (states(export_power_entity) | float(0) -
                          states('input_number.export_optimizer_max_export_power_w') | float(3000)) | abs > 50 }}
                then:
                  - service: number.set_value
                    data:
                      entity_id: "{{ export_power_entity }}"
                      value: "{{ states('input_number.export_optimizer_max_export_power_w') | float(3000) }}"

          - conditions:
              - condition: state
                entity_id: input_boolean.export_optimizer_export_guard_active
                state: "on"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ states(work_mode_entity) != zero_export_mode }}"
                then:
                  - service: select.select_option
                    data:
                      entity_id: "{{ work_mode_entity }}"
                      option: "{{ zero_export_mode }}"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.export_optimizer_export_guard_active
