# Home Assistant package: Ochrana exportu pri zapornych spotovych cenach
#
# Subor je urceny na vlozenie do adresara packages/ v Home Assistant.
# Slovenske nazvy entit su zobrazovane nazvy. default_entity_id drzi stabilne entity_id,
# aby sablony a automatizacie fungovali aj po premenovani nazvu v UI.
#
# Ocakavane entity z integracii:
# - sensor.okte_ceny_elektriny_prices               # OKTE ceny, musi mat atribut prices
# - sensor.solcast_pv_forecast_predpoved_dnes       # Solcast predpoved dnes, musi mat atribut detailedForecast
# - sensor.inverter_today_load_consumption          # dnesna spotreba domu v kWh, reset o polnoci
# - sensor.inverter_total_energy_export             # celkovy export do siete v kWh, stale rastuci counter
# - sensor.inverter_today_production                # dnesna PV vyroba v kWh
# - sensor.inverter_battery                         # SOC baterie v %
# - sensor.inverter_battery_capacity                # kapacita baterie v kWh, fallback je 20 kWh
# - sensor.inverter_pv_power                        # aktualny PV vykon vo W
# - sensor.inverter_load_power                      # aktualna spotreba domu vo W
# - select.inverter_work_mode                       # rezim menica: Export First / Zero Export To CT
# - number.inverter_export_surplus_power            # maximalny vykon exportu do siete vo W
# - sensor.cena_vykupu_elektriny                    # realna vykupna cena v EUR/kWh, pri zapornej spotovej cene ma byt 0
# - input_number.cena_elektriny_nocny_tarif         # konzervativna hodnota energie pre vypocet strateneho potencialu

input_datetime:
  magna_solar_window_start_recorded:
    name: Magna - cas zaznamu rannej spotreby
    has_date: true
    has_time: true

input_number:
  magna_solar_window_start_load_kwh:
    name: Magna - ranna spotreba domu
    min: 0
    max: 100
    step: 0.01
    unit_of_measurement: kWh
    mode: box

  magna_min_reserve_soc:
    name: Magna - minimalna rezerva baterie
    min: 10
    max: 90
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 40

  magna_consumption_margin_kwh:
    name: Magna - rezerva odhadu spotreby
    min: 0
    max: 10
    step: 0.5
    unit_of_measurement: kWh
    mode: slider
    initial: 2

  magna_export_surplus_threshold_kwh:
    name: Magna - minimalny ocakavany prebytok
    min: 0
    max: 10
    step: 0.25
    unit_of_measurement: kWh
    mode: slider
    initial: 1

  magna_price_floor:
    name: Magna - minimalna spotova cena pre export
    min: -50
    max: 50
    step: 0.1
    unit_of_measurement: EUR/MWh
    mode: box
    initial: 0

  magna_min_export_power_w:
    name: Magna - minimalny riadeny vykon exportu
    min: 0
    max: 5000
    step: 100
    unit_of_measurement: W
    mode: slider
    initial: 500

  magna_max_export_power_w:
    name: Magna - maximalny riadeny vykon exportu
    min: 100
    max: 10000
    step: 100
    unit_of_measurement: W
    mode: slider
    initial: 3000

input_boolean:
  magna_export_guard_enabled:
    name: Magna - ochrana exportu zapnuta
    icon: mdi:shield-sun
    initial: true

  magna_export_guard_active:
    name: Magna - riadeny export aktivny
    icon: mdi:transmission-tower-export
    initial: false

  magna_allow_battery_early_export:
    name: Magna - povolit skory export z baterie
    icon: mdi:battery-arrow-down
    initial: true

template:
  - trigger:
      - platform: time
        at: "17:00:00"
    sensor:
      - name: Magna - priemer spotreby v solarnom okne 7d
        default_entity_id: sensor.magna_solar_window_load_7d_average
        unique_id: magna_solar_window_load_7d_average
        unit_of_measurement: kWh
        state: >
          {% set recorded = as_datetime(states('input_datetime.magna_solar_window_start_recorded')) %}
          {% set valid = recorded is not none and recorded.date() == now().date() %}
          {% set start = states('input_number.magna_solar_window_start_load_kwh') | float(0) %}
          {% set current = states('sensor.inverter_today_load_consumption') | float(0) %}
          {% set sample = [current - start, 0] | max if valid else 0 %}
          {% set old = (this.attributes.samples_csv | default('', true)).split(',') | reject('eq','') | map('float') | list %}
          {% set new = ([sample] + old)[:7] if sample > 0 else old %}
          {{ ((new | sum) / (new | count)) | round(2) if new | count > 0 else 6 }}
        attributes:
          samples_csv: >
            {% set recorded = as_datetime(states('input_datetime.magna_solar_window_start_recorded')) %}
            {% set valid = recorded is not none and recorded.date() == now().date() %}
            {% set start = states('input_number.magna_solar_window_start_load_kwh') | float(0) %}
            {% set current = states('sensor.inverter_today_load_consumption') | float(0) %}
            {% set sample = [current - start, 0] | max if valid else 0 %}
            {% set old = (this.attributes.samples_csv | default('', true)).split(',') | reject('eq','') | map('float') | list %}
            {% set new = ([sample] + old)[:7] if sample > 0 else old %}
            {{ new | join(',') }}

  - trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: sensor.okte_ceny_elektriny_prices
    sensor:
      - name: Magna OKTE spotova cena
        default_entity_id: sensor.magna_okte_spotova_cena
        unique_id: magna_okte_spot_price
        unit_of_measurement: EUR/MWh
        state: >
          {% set prices = state_attr('sensor.okte_ceny_elektriny_prices', 'prices') or [] %}
          {% set now_local = now() %}
          {% set ns = namespace(price=none) %}
          {% for p in prices %}
            {% set start_local = as_local(as_datetime(p.start)) %}
            {% if start_local <= now_local and now_local < start_local + timedelta(minutes=15) %}
              {% set ns.price = p.price | float %}
            {% endif %}
          {% endfor %}
          {{ ns.price if ns.price is not none else states('sensor.okte_ceny_elektriny_prices') | float(999) }}
        attributes:
          source: okte_prices_attribute

  - trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: state
        entity_id:
          - sensor.inverter_today_production
          - sensor.inverter_today_load_consumption
          - sensor.solcast_pv_forecast_predpoved_dnes
          - sensor.magna_okte_spotova_cena
          - input_boolean.magna_allow_battery_early_export
          - input_number.magna_price_floor
          - input_number.magna_min_export_power_w
          - input_number.magna_max_export_power_w
          - input_number.magna_consumption_margin_kwh
          - input_number.magna_export_surplus_threshold_kwh
          - input_number.magna_min_reserve_soc
    sensor:
      - name: Magna - zostavajuca PV predpoved dnes
        default_entity_id: sensor.magna_remaining_pv_forecast_today
        unique_id: magna_remaining_pv_forecast_today
        unit_of_measurement: kWh
        state: >
          {% set forecast = states('sensor.solcast_pv_forecast_predpoved_dnes') | float(0) %}
          {% set actual = states('sensor.inverter_today_production') | float(0) %}
          {{ [forecast - actual, 0] | max | round(2) }}

      - name: Magna - spotreba v solarnom okne dnes
        default_entity_id: sensor.magna_solar_window_load_today
        unique_id: magna_solar_window_load_today
        unit_of_measurement: kWh
        state: >
          {% set recorded = as_datetime(states('input_datetime.magna_solar_window_start_recorded')) %}
          {% set valid = recorded is not none and recorded.date() == now().date() %}
          {% if now() < today_at('07:00') or not valid %}
            0
          {% else %}
            {% set start = states('input_number.magna_solar_window_start_load_kwh') | float(0) %}
            {% set current = states('sensor.inverter_today_load_consumption') | float(0) %}
            {{ [current - start, 0] | max | round(2) }}
          {% endif %}

      - name: Magna - odhad zostavajucej spotreby v solarnom okne
        default_entity_id: sensor.magna_remaining_solar_window_load_estimate
        unique_id: magna_remaining_solar_window_load_estimate
        unit_of_measurement: kWh
        state: >
          {% set avg = states('sensor.magna_solar_window_load_7d_average') | float(6) %}
          {% set margin = states('input_number.magna_consumption_margin_kwh') | float(2) %}
          {% set used = states('sensor.magna_solar_window_load_today') | float(0) %}
          {% if now() >= today_at('17:00') %}
            0
          {% else %}
            {{ [avg + margin - used, 0] | max | round(2) }}
          {% endif %}

      - name: Magna - minuty zapornej ceny do 17:00
        default_entity_id: sensor.magna_negative_price_minutes_until_17
        unique_id: magna_negative_price_minutes_until_17
        unit_of_measurement: min
        state: >
          {% set prices = state_attr('sensor.okte_ceny_elektriny_prices','prices') or [] %}
          {% set now_ts = as_timestamp(now()) %}
          {% set horizon = as_timestamp(today_at('17:00')) %}
          {% set floor = states('input_number.magna_price_floor') | float(0) %}
          {% set ns = namespace(minutes=0) %}
          {% for p in prices %}
            {% set s = as_timestamp(as_datetime(p.start)) %}
            {% if s >= now_ts and s < horizon and (p.price | float(999)) < floor %}
              {% set ns.minutes = ns.minutes + 15 %}
            {% endif %}
          {% endfor %}
          {{ ns.minutes }}

      - name: Magna - cielove SOC baterie
        default_entity_id: sensor.magna_battery_target_soc
        unique_id: magna_battery_target_soc
        unit_of_measurement: "%"
        state: >
          {% set cap = states('sensor.inverter_battery_capacity') | float(20) %}
          {% set reserve = states('input_number.magna_min_reserve_soc') | float(40) %}
          {% set remaining_load = states('sensor.magna_remaining_solar_window_load_estimate') | float(0) %}
          {% set remaining_pv = states('sensor.magna_remaining_pv_forecast_today') | float(0) %}
          {% set uncovered_load = [remaining_load - remaining_pv, 0] | max %}
          {{ [reserve + (uncovered_load / cap * 100), 95] | min | round(0) }}

      - name: Magna - ocakavany prebytok dnes
        default_entity_id: sensor.magna_expected_surplus_today
        unique_id: magna_expected_surplus_today
        unit_of_measurement: kWh
        state: >
          {% set cap = states('sensor.inverter_battery_capacity') | float(20) %}
          {% set soc = states('sensor.inverter_battery') | float(0) %}
          {% set reserve = states('input_number.magna_min_reserve_soc') | float(40) %}
          {% set battery_above_reserve = [((soc - reserve) / 100 * cap), 0] | max %}
          {% set remaining_pv = states('sensor.magna_remaining_pv_forecast_today') | float(0) %}
          {% set remaining_load = states('sensor.magna_remaining_solar_window_load_estimate') | float(0) %}
          {{ (battery_above_reserve + remaining_pv - remaining_load) | round(2) }}

      - name: Magna - odporucany vykon exportu
        default_entity_id: sensor.magna_recommended_export_power
        unique_id: magna_recommended_export_power
        unit_of_measurement: W
        state: >
          {% set price = states('sensor.magna_okte_spotova_cena') | float(999) %}
          {% set floor = states('input_number.magna_price_floor') | float(0) %}
          {% if price < floor or now() < today_at('07:00') or now() >= today_at('17:00') %}
            0
          {% else %}
            {% set prices = state_attr('sensor.okte_ceny_elektriny_prices','prices') or [] %}
            {% set forecast = state_attr('sensor.solcast_pv_forecast_predpoved_dnes','detailedForecast') or [] %}
            {% set now_local = now() %}
            {% set window_end = today_at('17:00') %}
            {% set cap = states('sensor.inverter_battery_capacity') | float(20) %}
            {% set soc = states('sensor.inverter_battery') | float(0) %}
            {% set battery_now = cap * soc / 100 %}
            {% set threshold = states('input_number.magna_export_surplus_threshold_kwh') | float(1) %}
            {% set remaining_load = states('sensor.magna_remaining_solar_window_load_estimate') | float(0) %}
            {% set min_w = states('input_number.magna_min_export_power_w') | float(500) %}
            {% set max_w = states('input_number.magna_max_export_power_w') | float(3000) %}
            {% set battery_export_allowed = is_state('input_boolean.magna_allow_battery_early_export', 'on') %}
            {% set pv_power = states('sensor.inverter_pv_power') | float(0) %}
            {% set load_power = states('sensor.inverter_load_power') | float(0) %}
            {% set live_surplus_w = [pv_power - load_power - 200, 0] | max %}

            {% set neg = namespace(start=none, end=none, done=false) %}
            {% for p in prices %}
              {% set s = as_local(as_datetime(p.start)) %}
              {% set e = s + timedelta(minutes=15) %}
              {% if not neg.done and e > now_local and s < window_end %}
                {% if (p.price | float(999)) < floor %}
                  {% if neg.start is none %}
                    {% set neg.start = [s, now_local] | max %}
                  {% endif %}
                  {% set neg.end = [e, window_end] | min %}
                {% elif neg.start is not none %}
                  {% set neg.done = true %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if neg.start is none %}
              0
            {% else %}
              {% set mins = namespace(before_neg=0) %}
              {% for p in prices %}
                {% set s = as_local(as_datetime(p.start)) %}
                {% set e = s + timedelta(minutes=15) %}
                {% if e > now_local and s < neg.start and (p.price | float(999)) >= floor %}
                  {% set a = [s, now_local] | max %}
                  {% set b = [e, neg.start] | min %}
                  {% if b > a %}
                    {% set mins.before_neg = mins.before_neg + ((as_timestamp(b) - as_timestamp(a)) / 60) %}
                  {% endif %}
                {% endif %}
              {% endfor %}

              {% set pv = namespace(before_neg=0, during_neg=0) %}
              {% for f in forecast %}
                {% set fs = as_local(as_datetime(f.period_start)) %}
                {% if loop.index0 + 1 < forecast | count %}
                  {% set next = forecast[loop.index0 + 1] %}
                  {% set fe = as_local(as_datetime(next.period_start)) %}
                {% else %}
                  {% set fe = fs + timedelta(minutes=30) %}
                {% endif %}
                {% set kw = f.pv_estimate | float(0) %}

                {% set a1 = [fs, now_local] | max %}
                {% set b1 = [fe, neg.start] | min %}
                {% if b1 > a1 %}
                  {% set pv.before_neg = pv.before_neg + kw * ((as_timestamp(b1) - as_timestamp(a1)) / 3600) %}
                {% endif %}

                {% set a2 = [fs, neg.start] | max %}
                {% set b2 = [fe, neg.end] | min %}
                {% if b2 > a2 %}
                  {% set pv.during_neg = pv.during_neg + kw * ((as_timestamp(b2) - as_timestamp(a2)) / 3600) %}
                {% endif %}
              {% endfor %}

              {% set minutes_to_17 = ((as_timestamp(window_end) - as_timestamp(now_local)) / 60) %}
              {% set load_rate = remaining_load / minutes_to_17 if minutes_to_17 > 0 else 0 %}
              {% set load_before_neg = load_rate * mins.before_neg %}
              {% set neg_minutes = ((as_timestamp(neg.end) - as_timestamp(neg.start)) / 60) %}
              {% set load_during_neg = load_rate * neg_minutes %}

              {% if mins.before_neg > 0 %}
                {% set net_before_neg = pv.before_neg - load_before_neg %}
                {% set net_during_neg = pv.during_neg - load_during_neg %}
                {% set energy_needed_before_neg = [battery_now + net_before_neg + net_during_neg - cap + threshold, 0] | max %}
                {% set pre_neg_w = energy_needed_before_neg * 1000 / (mins.before_neg / 60) %}
              {% else %}
                {% set pre_neg_w = 0 %}
              {% endif %}

              {% if battery_export_allowed %}
                {% set raw_w = pre_neg_w %}
              {% else %}
                {% set raw_w = [pre_neg_w, live_surplus_w] | min %}
              {% endif %}

              {% if raw_w <= 0 %}
                0
              {% elif battery_export_allowed %}
                {{ [[raw_w, min_w] | max, max_w] | min | round(0) }}
              {% else %}
                {{ [raw_w, max_w] | min | round(0) }}
              {% endif %}
            {% endif %}
          {% endif %}

  - trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: state
        entity_id:
          - sensor.magna_okte_spotova_cena
          - sensor.magna_recommended_export_power
          - sensor.magna_expected_surplus_today
          - sensor.magna_battery_target_soc
          - sensor.magna_negative_price_minutes_until_17
          - input_boolean.magna_export_guard_enabled
          - input_boolean.magna_allow_battery_early_export
    binary_sensor:
      - name: Magna - export pozadovany
        default_entity_id: binary_sensor.magna_export_wanted
        unique_id: magna_export_wanted
        state: >
          {% set enabled = is_state('input_boolean.magna_export_guard_enabled','on') %}
          {% set battery_export_allowed = is_state('input_boolean.magna_allow_battery_early_export', 'on') %}
          {% set price = states('sensor.magna_okte_spotova_cena') | float(999) %}
          {% set floor = states('input_number.magna_price_floor') | float(0) %}
          {% set soc = states('sensor.inverter_battery') | float(0) %}
          {% set target = states('sensor.magna_battery_target_soc') | float(95) %}
          {% set surplus = states('sensor.magna_expected_surplus_today') | float(0) %}
          {% set threshold = states('input_number.magna_export_surplus_threshold_kwh') | float(1) %}
          {% set export_w = states('sensor.magna_recommended_export_power') | float(0) %}
          {% set future_negative_today = states('sensor.magna_negative_price_minutes_until_17') | int(0) > 0 %}
          {% set soc_ok = soc > target + 2 if battery_export_allowed else true %}
          {{ enabled
             and now() >= today_at('07:00')
             and now() < today_at('17:00')
             and price >= floor
             and future_negative_today
             and soc_ok
             and surplus > threshold
             and export_w > 0 }}

  - trigger:
      - platform: state
        entity_id: sensor.inverter_total_energy_export
    sensor:
      - name: Magna - energia exportovana pocas zapornej ceny
        default_entity_id: sensor.magna_exported_energy_during_negative_spot_price
        unique_id: magna_exported_energy_during_negative_spot_price
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        state: >
          {% set previous_export = this.attributes.last_export_kwh | default(trigger.from_state.state | float(0), true) | float(0) %}
          {% set current_export = trigger.to_state.state | float(0) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% if states('sensor.magna_okte_spotova_cena') | float(999) < 0 %}
            {{ (previous_total + valid_delta) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ trigger.to_state.state | float(0) }}"

      - name: Magna - energia exportovana automatizaciou
        default_entity_id: sensor.magna_exported_energy_by_automation
        unique_id: magna_exported_energy_by_automation
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        state: >
          {% set previous_export = this.attributes.last_export_kwh | default(trigger.from_state.state | float(0), true) | float(0) %}
          {% set current_export = trigger.to_state.state | float(0) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% if is_state('input_boolean.magna_export_guard_active', 'on') %}
            {{ (previous_total + valid_delta) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ trigger.to_state.state | float(0) }}"

      - name: Magna - uspora automatizovaneho exportu
        default_entity_id: sensor.magna_automation_export_savings
        unique_id: magna_automation_export_savings
        unit_of_measurement: EUR
        device_class: monetary
        state_class: total
        state: >
          {% set previous_export = this.attributes.last_export_kwh | default(trigger.from_state.state | float(0), true) | float(0) %}
          {% set current_export = trigger.to_state.state | float(0) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% set buyout_price = states('sensor.cena_vykupu_elektriny') | float(0) %}
          {% if is_state('input_boolean.magna_export_guard_active', 'on') %}
            {{ (previous_total + (valid_delta * buyout_price)) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ trigger.to_state.state | float(0) }}"
          current_buyout_price_eur_kwh: "{{ states('sensor.cena_vykupu_elektriny') | float(0) }}"

      - name: Magna - strateny potencial pri zapornej cene
        default_entity_id: sensor.magna_negative_price_wasted_potential
        unique_id: magna_negative_price_wasted_potential
        unit_of_measurement: EUR
        device_class: monetary
        state_class: total
        state: >
          {% set previous_export = this.attributes.last_export_kwh | default(trigger.from_state.state | float(0), true) | float(0) %}
          {% set current_export = trigger.to_state.state | float(0) %}
          {% set delta = current_export - previous_export %}
          {% set valid_delta = delta if delta > 0 else 0 %}
          {% set previous_total = this.state | float(0) %}
          {% set buyout_price = states('input_number.cena_elektriny_nocny_tarif') | float(0) * 0.88 %}
          {% if states('sensor.magna_okte_spotova_cena') | float(999) < 0 %}
            {{ (previous_total + (valid_delta * buyout_price)) | round(4) }}
          {% else %}
            {{ previous_total | round(4) }}
          {% endif %}
        attributes:
          last_export_kwh: "{{ trigger.to_state.state | float(0) }}"
          hypothetical_buyout_price_eur_kwh: "{{ states('input_number.cena_elektriny_nocny_tarif') | float(0) * 0.88 }}"

automation:
  - alias: Magna Pozicovna - zaznamenat zaciatok solarneho okna
    id: magna_pozicovna_record_solar_window_start
    description: Zapise spotrebu domu o 07:00, aby sa dala vypocitat spotreba iba pocas solarneho okna.
    mode: single
    trigger:
      - platform: time
        at: "07:00:00"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.magna_solar_window_start_load_kwh
        data:
          value: "{{ states('sensor.inverter_today_load_consumption') | float(0) }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.magna_solar_window_start_recorded
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - alias: Magna Pozicovna - export iba ked je bezpecny
    id: magna_pozicovna_export_only_when_safe
    description: Prepina menic do Export First iba vtedy, ked treba vytvorit miesto v baterii pred zapornou spotovou cenou.
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.magna_export_wanted
          - sensor.magna_okte_spotova_cena
          - sensor.magna_recommended_export_power
          - input_boolean.magna_export_guard_enabled
          - input_boolean.magna_allow_battery_early_export
          - select.inverter_work_mode
      - platform: numeric_state
        entity_id: sensor.inverter_battery
        above: 99.5
      - platform: homeassistant
        event: start
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.magna_export_guard_enabled
                state: "off"
              - condition: state
                entity_id: input_boolean.magna_export_guard_active
                state: "on"
            sequence:
              - if:
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: select.inverter_work_mode
                        state: "Zero Export To CT"
                then:
                  - service: select.select_option
                    target:
                      entity_id: select.inverter_work_mode
                    data:
                      option: "Zero Export To CT"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.magna_export_guard_active

          - conditions:
              - condition: numeric_state
                entity_id: sensor.magna_okte_spotova_cena
                below: 0
            sequence:
              - if:
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: select.inverter_work_mode
                        state: "Zero Export To CT"
                then:
                  - service: select.select_option
                    target:
                      entity_id: select.inverter_work_mode
                    data:
                      option: "Zero Export To CT"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.magna_export_guard_active

          - conditions:
              - condition: state
                entity_id: input_boolean.magna_export_guard_enabled
                state: "on"
              - condition: state
                entity_id: binary_sensor.magna_export_wanted
                state: "on"
            sequence:
              - variables:
                  recommended_w: "{{ states('sensor.magna_recommended_export_power') | float(0) }}"
                  live_surplus_w: >
                    {{ [states('sensor.inverter_pv_power') | float(0) -
                        states('sensor.inverter_load_power') | float(0) - 200, 0] | max }}
                  max_w: "{{ states('input_number.magna_max_export_power_w') | float(3000) }}"
                  export_power_target: >
                    {% if states('sensor.inverter_battery') | float(0) >= 99.5 %}
                      {{ [[recommended_w | float(0), live_surplus_w | float(0)] | max, max_w | float(3000)] | min }}
                    {% else %}
                      {{ recommended_w | float(0) }}
                    {% endif %}
              - if:
                  - condition: template
                    value_template: >
                      {{ (states('number.inverter_export_surplus_power') | float(0) -
                          export_power_target | float(0)) | abs > 50 }}
                then:
                  - service: number.set_value
                    target:
                      entity_id: number.inverter_export_surplus_power
                    data:
                      value: "{{ export_power_target | float(0) }}"
              - if:
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: select.inverter_work_mode
                        state: "Export First"
                then:
                  - service: select.select_option
                    target:
                      entity_id: select.inverter_work_mode
                    data:
                      option: "Export First"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.magna_export_guard_active

          - conditions:
              - condition: state
                entity_id: input_boolean.magna_export_guard_enabled
                state: "on"
              - condition: state
                entity_id: select.inverter_work_mode
                state: "Zero Export To CT"
              - condition: numeric_state
                entity_id: sensor.inverter_battery
                above: 99.5
              - condition: numeric_state
                entity_id: sensor.magna_okte_spotova_cena
                above: -0.001
            sequence:
              - if:
                  - condition: template
                    value_template: >
                      {{ (states('number.inverter_export_surplus_power') | float(0) -
                          states('input_number.magna_max_export_power_w') | float(3000)) | abs > 50 }}
                then:
                  - service: number.set_value
                    target:
                      entity_id: number.inverter_export_surplus_power
                    data:
                      value: "{{ states('input_number.magna_max_export_power_w') | float(3000) }}"

          - conditions:
              - condition: state
                entity_id: input_boolean.magna_export_guard_active
                state: "on"
            sequence:
              - if:
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: select.inverter_work_mode
                        state: "Zero Export To CT"
                then:
                  - service: select.select_option
                    target:
                      entity_id: select.inverter_work_mode
                    data:
                      option: "Zero Export To CT"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.magna_export_guard_active
